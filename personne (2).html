<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Joueur — Caïssa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--void:#0a0b0e;--panel:#121419;--line:rgba(255,255,255,.08);--ivory:#f0e9dc;
    --muted:#948b7a;--brass:#cba861;--pop:cubic-bezier(.16,1,.3,1)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Space Grotesk",system-ui,sans-serif;background:var(--void);color:var(--ivory);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100dvh}
  a{color:inherit}
  .topbar{display:flex;align-items:center;gap:14px;padding:18px 22px;border-bottom:1px solid var(--line)}
  .back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--muted);font-size:.9rem;padding:7px 12px;border:1px solid var(--line);border-radius:999px;transition:.2s}
  .back:hover{color:var(--ivory);border-color:var(--brass)}
  .topbar__brand{font-family:"Instrument Serif",serif;font-size:1.3rem;margin-left:auto}.topbar__brand em{font-style:italic;color:var(--brass)}
  .wrap{max-width:820px;margin:0 auto;padding:30px 22px 70px}

  .hero{display:flex;gap:22px;align-items:flex-start;margin-bottom:26px}
  .photo{width:120px;height:120px;flex:none;border-radius:16px;object-fit:cover;background:var(--panel);border:1px solid var(--line)}
  .photo.ph{display:flex;align-items:center;justify-content:center;font-family:"Instrument Serif",serif;font-size:3rem;color:var(--brass)}
  .hero__name{font-family:"Instrument Serif",serif;font-size:clamp(2rem,5vw,2.8rem);line-height:1.05}
  .hero__meta{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:8px;color:var(--muted);font-size:.92rem}
  .badge{font-size:.72rem;letter-spacing:.06em;color:var(--void);background:var(--brass);padding:3px 9px;border-radius:6px;font-weight:600}
  .note{margin-top:10px;color:var(--ivory);font-size:.98rem}

  .block{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:16px}
  .block h3{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--brass);margin-bottom:12px;font-weight:600}
  .bio{color:#ddd6c8;font-size:.98rem}
  .bio .src{display:inline-block;margin-top:12px;color:var(--brass);text-decoration:none;font-size:.86rem}
  .bio .src:hover{text-decoration:underline}
  .muted{color:var(--muted);font-size:.9rem}

  .accts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){.accts{grid-template-columns:1fr}}
  .acct{display:flex;align-items:center;gap:14px;padding:15px 16px;border:1px solid var(--line);border-radius:14px;
    background:#0e1014;text-decoration:none;transition:.2s;cursor:pointer}
  .acct:hover{border-color:var(--brass);background:rgba(203,168,97,.06);transform:translateY(-1px)}
  .acct.off{opacity:.5;pointer-events:none}
  .acct__logo{width:38px;height:38px;flex:none;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem}
  .acct__logo.cc{background:#7fa650;color:#122}.acct__logo.li{background:#e8e2d3;color:#111}
  .acct__body{min-width:0}
  .acct__k{font-size:.75rem;color:var(--muted)}
  .acct__v{font-size:1rem;color:var(--ivory);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .acct__go{margin-left:auto;color:var(--muted);flex:none}
  .msg{color:var(--muted);padding:26px 0;text-align:center}.msg.err{color:#c97d6b}

  .rline{display:flex;gap:16px;flex-wrap:wrap;margin-top:2px}
  .rline .r{font-size:.9rem;color:var(--muted)}.rline .r b{color:var(--ivory);font-size:1.05rem}
</style>
</head>
<body>
  <header class="topbar">
    <a class="back" href="index.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Retour</a>
    <span class="topbar__brand">Ca<em>ï</em>ssa.</span>
  </header>

  <div class="wrap" id="wrap"><p class="msg">Chargement…</p></div>

  <script src="players.js"></script>
  <script>
  const $=id=>document.getElementById(id);
  const PAR=new URLSearchParams(location.search);
  const list=window.PLAYERS||[];
  const norm=s=>(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
  const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  function flag(cc){ if(!cc||cc.length!==2) return ""; return String.fromCodePoint(...[...cc.toUpperCase()].map(c=>127397+c.charCodeAt(0))); }
  const TITLES={GM:"Grand maître",IM:"Maître international",FM:"Maître FIDE",WGM:"Grand maître féminin",WIM:"Maître international féminin"};

  const q=(PAR.get("name")||PAR.get("id")||"").trim();
  const p = list.find(x=>x.n===q) || list.find(x=>norm(x.n)===norm(q));

  if(!q){ document.getElementById("wrap").innerHTML='<p class="msg err">Aucun joueur indiqué. Reviens à l\'accueil pour en chercher un.</p>'; }
  else render(p || {n:q, _off:true});

  function render(p){
    const title = TITLES[p.t] ? `${TITLES[p.t]} (${p.t})` : (p.t||"");
    let h=`
      <div class="hero">
        <div class="photo ph" id="photo">${esc(p.n[0])}</div>
        <div>
          <div class="hero__name">${esc(p.n)}</div>
          <div class="hero__meta">
            ${p.t?`<span class="badge">${p.t}</span>`:""}
            ${title?`<span>${title}</span>`:""}
            ${p.c?`<span>${flag(p.c)} ${p.c}</span>`:""}
          </div>
          ${p.note?`<div class="note">${esc(p.note)}</div>`:""}
          <div class="rline" id="liveStats"></div>
        </div>
      </div>

      <div class="block">
        <h3>Parcours</h3>
        <div class="bio" id="bio"><p class="muted">Chargement de la biographie…</p></div>
      </div>

      <div class="block">
        <h3>Ses comptes en ligne</h3>
        <p class="muted" style="margin-bottom:14px">Ouvre la fiche de compte (profil, Elo, parties récentes) sur la plateforme choisie.</p>
        <div class="accts">
          ${acct("cc","Chess.com",p.cc,p.cc?`joueur.html?p=chesscom&u=${encodeURIComponent(p.cc)}`:null)}
          ${acct("li","Lichess",p.li,p.li?`joueur.html?p=lichess&u=${encodeURIComponent(p.li)}`:null)}
        </div>
        ${(!p.cc&&!p.li)?'<p class="muted" style="margin-top:12px">Aucun compte en ligne connu pour ce joueur.</p>':""}
      </div>`;
    $("wrap").innerHTML=h;
    loadBio(p);
    if(p.cc) loadLiveStats(p.cc);
  }

  function acct(kind,label,handle,href){
    const logo = kind==="cc" ? "C.c" : "Li";
    if(!handle) return `<div class="acct off"><div class="acct__logo ${kind}">${logo}</div><div class="acct__body"><div class="acct__k">${label}</div><div class="acct__v">— non connu</div></div></div>`;
    return `<a class="acct" href="${href}"><div class="acct__logo ${kind}">${logo}</div>
      <div class="acct__body"><div class="acct__k">${label}</div><div class="acct__v">@${esc(handle)}</div></div>
      <span class="acct__go">→</span></a>`;
  }

  const GTITLES={GM:"grand maître",IM:"maître international",FM:"maître FIDE",WGM:"grande maître internationale",WIM:"maître international féminin",CM:"candidat maître"};
  function genericBio(p){
    const tt=GTITLES[p.t];
    let s = `${esc(p.n)} est ${tt?("un "+tt+" (") : "un joueur d'échecs"}`;
    if(tt){ s += p.t + ")"; }
    s += p.c ? `, de nationalité ${flag(p.c)} ${p.c}.` : ".";
    s += ` Ce joueur n'a pas encore de fiche Wikipédia détaillée — les informations proviennent des bases FIDE / Wikidata.`;
    return s;
  }

  async function loadBio(p){
    const title=p.w||p.n;
    const langs=["fr","en"];
    for(const l of langs){
      try{
        const r=await fetch(`https://${l}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
        if(!r.ok) continue;
        const d=await r.json();
        if(d.type==="disambiguation"||!d.extract) continue;
        $("bio").innerHTML=`<p>${esc(d.extract)}</p>${d.content_urls?.desktop?.page?`<a class="src" href="${d.content_urls.desktop.page}" target="_blank" rel="noopener">Lire sur Wikipédia ↗</a>`:""}`;
        if(d.thumbnail?.source){ const ph=$("photo"); ph.classList.remove("ph"); ph.outerHTML=`<img class="photo" src="${d.thumbnail.source}" alt="${esc(p.n)}">`; }
        return;
      }catch(e){}
    }
    $("bio").innerHTML='<p>'+genericBio(p)+'</p>';
  }

  async function loadLiveStats(handle){
    try{
      const st=await fetch("https://api.chess.com/pub/player/"+handle.toLowerCase()+"/stats").then(r=>r.ok?r.json():null);
      if(!st) return;
      const out=[];
      for(const [k,lbl] of [["chess_blitz","Blitz"],["chess_rapid","Rapide"],["chess_bullet","Bullet"]]){
        if(st[k]?.last?.rating) out.push(`<span class="r"><b>${st[k].last.rating}</b> ${lbl}</span>`);
      }
      if(out.length) $("liveStats").innerHTML = out.join("") + '<span class="r" style="align-self:center">· Elo Chess.com actuel</span>';
    }catch(e){}
  }
  </script>
</body>
</html>
