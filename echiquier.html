<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Échiquier — Caïssa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* >>> Fond jardin zen : change --zen pour ta propre image. */
    --zen:url("https://images.unsplash.com/photo-1528360983277-13d401cdc186?q=80&w=2000&auto=format&fit=crop");
    --ivory:#f4efe4;--muted:#c9c2b2;--brass:#cba861;--line:rgba(255,255,255,.14);
    --sq-light:#efe7d6;--sq-dark:#8a7b5f;--pop:cubic-bezier(.16,1,.3,1)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Space Grotesk",system-ui,sans-serif;color:var(--ivory);min-height:100dvh;
    -webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden}
  a{color:inherit}
  /* fond zen */
  .bg{position:fixed;inset:0;z-index:0;background:
    linear-gradient(rgba(20,26,22,.55),rgba(12,16,14,.7)), var(--zen);
    background-size:cover;background-position:center;
    background-color:#2b3329 /* repli si l'image ne charge pas */}
  .topbar{position:relative;z-index:2;display:flex;align-items:center;gap:14px;padding:18px 22px}
  .back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--ivory);font-size:.9rem;
    padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(0,0,0,.25);backdrop-filter:blur(6px);transition:.2s}
  .back:hover{border-color:var(--brass)}
  .topbar__brand{font-family:"Instrument Serif",serif;font-size:1.3rem;margin-left:auto;text-shadow:0 2px 8px rgba(0,0,0,.5)}
  .topbar__brand em{font-style:italic;color:var(--brass)}

  .stage{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;
    padding:10px 20px 50px;min-height:calc(100dvh - 70px);justify-content:center}
  .title{font-family:"Instrument Serif",serif;font-size:clamp(1.6rem,4vw,2.3rem);margin-bottom:4px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .turn{color:var(--muted);font-size:.9rem;margin-bottom:18px;display:flex;align-items:center;gap:8px}
  .turn .pip{width:12px;height:12px;border-radius:50%;border:1px solid rgba(255,255,255,.5);background:#f4efe4;transition:.2s}
  .turn.black .pip{background:#1c1c1e}

  .board{position:relative;width:min(64vh,540px,90vw);aspect-ratio:1;border-radius:14px;overflow:hidden;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.12)}
  .sq{position:absolute;width:12.5%;height:12.5%}
  .sq.dark{background:var(--sq-dark)}.sq.light{background:var(--sq-light)}
  .sq.sel::after{content:"";position:absolute;inset:0;background:rgba(203,168,97,.5)}
  .sq.hl::after{content:"";position:absolute;inset:0;background:rgba(203,168,97,.38)}
  .sq.dest::after{content:"";position:absolute;inset:0;background:radial-gradient(circle,rgba(30,25,15,.32) 22%,transparent 24%)}
  .sq .coordbig{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:"Instrument Serif",serif;font-weight:600;font-size:min(6vh,46px);color:#1a1a17;
    text-shadow:0 1px 0 rgba(255,255,255,.35);pointer-events:none;z-index:5}
  .sq.dark .coordbig{color:#f4efe4;text-shadow:0 1px 3px rgba(0,0,0,.5)}
  .coord{position:absolute;font-size:9px;font-weight:600;opacity:.5;pointer-events:none}
  .coord.file{bottom:2px;right:3px}.coord.rank{top:2px;left:3px}
  .piece{position:absolute;width:12.5%;height:12.5%;z-index:3;cursor:pointer;background-size:84%;background-position:center;background-repeat:no-repeat;
    transition:left .26s var(--pop),top .26s var(--pop),opacity .2s;display:flex;align-items:center;justify-content:center;font-size:min(7vh,60px);line-height:1;user-select:none}
  .piece.fade{opacity:0}

  .controls{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;justify-content:center}
  .btn{display:inline-flex;align-items:center;gap:8px;font-family:inherit;font-size:.9rem;color:var(--ivory);cursor:pointer;
    padding:10px 16px;border:1px solid var(--line);border-radius:11px;background:rgba(0,0,0,.28);backdrop-filter:blur(6px);transition:.2s}
  .btn:hover{border-color:var(--brass)}.btn:disabled{opacity:.4;cursor:default}
  .btn.primary{background:rgba(203,168,97,.9);color:#171310;border-color:transparent;font-weight:600}
  .hint{margin-top:16px;color:var(--muted);font-size:.82rem;text-align:center;max-width:44ch;text-shadow:0 1px 4px rgba(0,0,0,.5)}
  @media (prefers-reduced-motion:reduce){.piece{transition:none}}
</style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <header class="topbar">
    <a class="back" href="index.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Retour</a>
    <span class="topbar__brand">Ca<em>ï</em>ssa.</span>
  </header>

  <main class="stage">
    <h1 class="title">Échiquier libre</h1>
    <div class="turn" id="turn"><span class="pip"></span> <span id="turnTxt">Aux Blancs de jouer</span></div>

    <div class="board" id="board"></div>

    <div class="controls">
      <button class="btn" id="undo" disabled>↶ Annuler le coup</button>
      <button class="btn" id="flip">⇅ Renverser</button>
      <button class="btn primary" id="reset">Nouvelle partie</button>
    </div>
    <p class="hint">Joue les deux camps à tour de rôle. <b>Clic droit</b> sur une case pour afficher sa case (ex. <b>d6</b>) en grand — reclique pour l'enlever.</p>
  </main>

  <script type="module">
  import { Chess } from "https://esm.run/chess.js";
  const $=id=>document.getElementById(id);
  const CDN="https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/piece/cburnett/";
  const UNI={wK:"♔",wQ:"♕",wR:"♖",wB:"♗",wN:"♘",wP:"♙",bK:"♚",bQ:"♛",bR:"♜",bB:"♝",bN:"♞",bP:"♟"};

  const game=new Chess();
  const boardEl=$("board"), PIECES={};
  let orient="w", sel=null, revealed=new Set();

  function sqXY(sq){const f=sq.charCodeAt(0)-97,r=+sq[1];return orient==="w"?{col:f,row:8-r}:{col:7-f,row:r-1};}
  function xy(sq){const{col,row}=sqXY(sq);return{left:col*12.5+"%",top:row*12.5+"%"};}

  function drawSquares(){
    boardEl.querySelectorAll(".sq").forEach(e=>e.remove());
    for(let r=0;r<8;r++)for(let c=0;c<8;c++){
      const d=document.createElement("div");const dark=(r+c)%2===1;
      d.className="sq "+(dark?"dark":"light");d.style.left=c*12.5+"%";d.style.top=r*12.5+"%";
      const file=orient==="w"?c:7-c,rank=orient==="w"?8-r:r+1,sq=String.fromCharCode(97+file)+rank;
      d.dataset.sq=sq;
      if(c===0){const rk=document.createElement("span");rk.className="coord rank";rk.textContent=rank;rk.style.color=dark?"#efe7d6":"#8a7b5f";d.appendChild(rk);}
      if(r===7){const fl=document.createElement("span");fl.className="coord file";fl.textContent=String.fromCharCode(97+file);fl.style.color=dark?"#efe7d6":"#8a7b5f";d.appendChild(fl);}
      d.addEventListener("click",()=>onClick(sq));
      d.addEventListener("contextmenu",e=>{ e.preventDefault(); toggleCoord(sq); });
      boardEl.appendChild(d);
    }
    applyRevealed();
  }
  function makePiece(code,sq){
    const el=document.createElement("div");el.className="piece";const st=xy(sq);el.style.left=st.left;el.style.top=st.top;
    el.style.backgroundImage=`url("${CDN}${code}.svg")`;
    const pb=new Image();pb.onerror=()=>{el.style.backgroundImage="none";el.textContent=UNI[code];el.style.color=code[0]==="w"?"#f4efe2":"#141412";el.style.textShadow=code[0]==="w"?"0 1px 3px rgba(0,0,0,.6)":"0 1px 1px rgba(255,255,255,.25)";};pb.src=`${CDN}${code}.svg`;
    el.addEventListener("click",e=>{e.stopPropagation();onClick(sq);});
    el.addEventListener("contextmenu",e=>{e.preventDefault();e.stopPropagation();toggleCoord(sq);});
    return el;
  }
  function setPos(){
    Object.values(PIECES).forEach(e=>e.remove());for(const k in PIECES)delete PIECES[k];
    const b=game.board();
    for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=b[r][c];if(!p)continue;
      const sq=String.fromCharCode(97+c)+(8-r);const el=makePiece(p.color+p.type.toUpperCase(),sq);PIECES[sq]=el;boardEl.appendChild(el);}
  }
  function animate(m){
    const mv=PIECES[m.from];if(!mv){setPos();return;}
    if(PIECES[m.to]){const c=PIECES[m.to];c.classList.add("fade");setTimeout(()=>c.remove(),200);}
    if(m.flags.includes("e")){const cs=m.to[0]+m.from[1];const c2=PIECES[cs];if(c2){c2.classList.add("fade");delete PIECES[cs];setTimeout(()=>c2.remove(),200);}}
    const st=xy(m.to);mv.style.left=st.left;mv.style.top=st.top;delete PIECES[m.from];PIECES[m.to]=mv;
    if(m.promotion){const code=m.color+m.promotion.toUpperCase();setTimeout(()=>{mv.style.backgroundImage=`url("${CDN}${code}.svg")`;if(mv.textContent)mv.textContent=UNI[code];},210);}
    if(m.flags.includes("k")||m.flags.includes("q")){const rk=m.from[1],rf=(m.flags.includes("k")?"h":"a")+rk,rt=(m.flags.includes("k")?"f":"d")+rk;const rook=PIECES[rf];if(rook){const rs=xy(rt);rook.style.left=rs.left;rook.style.top=rs.top;delete PIECES[rf];PIECES[rt]=rook;}}
  }

  function clearMarks(){boardEl.querySelectorAll(".sq.sel,.sq.dest,.sq.hl").forEach(e=>e.classList.remove("sel","dest","hl"));}
  function markLast(){const h=game.history({verbose:true});if(h.length){const m=h[h.length-1];[m.from,m.to].forEach(s=>{const el=boardEl.querySelector(`.sq[data-sq="${s}"]`);if(el)el.classList.add("hl");});}}
  function refreshMarks(){clearMarks();markLast();if(sel){const el=boardEl.querySelector(`.sq[data-sq="${sel}"]`);if(el)el.classList.add("sel");
    game.moves({square:sel,verbose:true}).forEach(m=>{const d=boardEl.querySelector(`.sq[data-sq="${m.to}"]`);if(d)d.classList.add("dest");});}}

  function onClick(sq){
    if(sel){
      if(sq===sel){sel=null;refreshMarks();return;}
      const legal=game.moves({square:sel,verbose:true}).some(m=>m.to===sq);
      if(legal){ let m; try{ m=game.move({from:sel,to:sq,promotion:"q"}); }catch(_){ m=null; }
        sel=null; if(m){ animate(m); afterMove(); } refreshMarks(); return; }
    }
    const p=game.get(sq);
    if(p && p.color===game.turn()){ sel=sq; refreshMarks(); }
    else { sel=null; refreshMarks(); }
  }
  function afterMove(){
    setTurn(); $("undo").disabled=game.history().length===0;
  }
  function setTurn(){
    const b=game.turn()==="b"; $("turn").classList.toggle("black",b);
    let t = b ? "Aux Noirs de jouer" : "Aux Blancs de jouer";
    if(game.isCheckmate()) t = (b?"Blancs":"Noirs")+" gagnent — échec et mat";
    else if(game.isDraw()) t = "Partie nulle";
    else if(game.isCheck()) t += " — échec";
    $("turnTxt").textContent=t;
  }

  /* clic droit : nomenclature en grand */
  function toggleCoord(sq){
    if(revealed.has(sq)) revealed.delete(sq); else revealed.add(sq);
    applyRevealed();
  }
  function applyRevealed(){
    boardEl.querySelectorAll(".coordbig").forEach(e=>e.remove());
    revealed.forEach(sq=>{ const cell=boardEl.querySelector(`.sq[data-sq="${sq}"]`);
      if(cell){ const l=document.createElement("span"); l.className="coordbig"; l.textContent=sq; cell.appendChild(l); } });
  }

  $("undo").onclick=()=>{ if(game.history().length===0) return; game.undo(); sel=null; setPos(); refreshMarks(); afterMove(); };
  $("reset").onclick=()=>{ game.reset(); sel=null; revealed.clear(); drawSquares(); setPos(); refreshMarks(); afterMove(); };
  $("flip").onclick=()=>{ orient=orient==="w"?"b":"w"; drawSquares(); setPos(); refreshMarks(); };

  // init
  drawSquares(); setPos(); setTurn();
  </script>
</body>
</html>
