<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Joueur — Caïssa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--void:#0a0b0e;--panel:#121419;--line:rgba(255,255,255,.08);--ivory:#f0e9dc;
    --muted:#948b7a;--brass:#cba861;--ok:#7fae86;--bad:#c97d6b;--pop:cubic-bezier(.16,1,.3,1)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Space Grotesk",system-ui,sans-serif;background:var(--void);color:var(--ivory);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100dvh}
  a{color:inherit}
  .topbar{display:flex;align-items:center;gap:14px;padding:18px 22px;border-bottom:1px solid var(--line)}
  .back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--muted);font-size:.9rem;padding:7px 12px;border:1px solid var(--line);border-radius:999px;transition:.2s}
  .back:hover{color:var(--ivory);border-color:var(--brass)}
  .topbar__brand{font-family:"Instrument Serif",serif;font-size:1.3rem;margin-left:auto}.topbar__brand em{font-style:italic;color:var(--brass)}
  .wrap{max-width:860px;margin:0 auto;padding:28px 22px 70px}

  .search{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .search input{flex:1;padding:11px 14px;border:1px solid var(--line);border-radius:999px;background:#0e1014;color:var(--ivory);font-family:inherit;font-size:1rem;outline:none}
  .search input:focus{border-color:var(--brass)}
  .search button{padding:11px 16px;border:0;border-radius:999px;background:var(--brass);color:var(--void);font-family:inherit;font-weight:600;cursor:pointer}
  .plat{display:flex;gap:6px;margin-bottom:26px}
  .plat button{font-family:inherit;font-size:.82rem;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:999px;padding:6px 14px;cursor:pointer;transition:.2s}
  .plat button.on{color:var(--void);background:var(--brass);border-color:var(--brass)}

  .head{display:flex;gap:18px;align-items:center;margin-bottom:24px}
  .avatar{width:66px;height:66px;border-radius:14px;flex:none;background:var(--panel);border:1px solid var(--line);object-fit:cover}
  .head__name{font-family:"Instrument Serif",serif;font-size:1.9rem;line-height:1.1}
  .head__meta{color:var(--muted);font-size:.88rem;margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
  .title-badge{font-size:.7rem;letter-spacing:.06em;color:var(--void);background:var(--brass);padding:2px 7px;border-radius:5px;font-weight:600;vertical-align:middle;margin-right:8px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:26px}
  .rc{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px}
  .rc__k{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .rc__v{font-size:1.7rem;font-weight:600;margin-top:4px}
  .rc__sub{font-size:.76rem;color:var(--muted);margin-top:3px}
  .rc__sub .w{color:var(--ok)}.rc__sub .l{color:var(--bad)}

  h2{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--brass);font-weight:600;margin:0 0 12px}
  .games{display:flex;flex-direction:column;gap:6px}
  .g{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--panel);text-decoration:none;transition:.15s}
  .g:hover{border-color:var(--brass);background:rgba(203,168,97,.06)}
  .g__res{flex:none;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem}
  .g__res.win{background:rgba(127,174,134,.18);color:var(--ok)}.g__res.loss{background:rgba(201,125,107,.18);color:var(--bad)}.g__res.draw{background:rgba(148,139,122,.18);color:var(--muted)}
  .g__body{min-width:0;flex:1}
  .g__players{font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .g__sub{font-size:.76rem;color:var(--muted)}
  .g__arrow{color:var(--muted);flex:none}
  .msg{color:var(--muted);padding:26px 0;text-align:center}
  .msg.err{color:var(--bad)}
  @media(max-width:560px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
  <header class="topbar">
    <a class="back" href="index.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Retour</a>
    <span class="topbar__brand">Ca<em>ï</em>ssa.</span>
  </header>

  <div class="wrap">
    <div class="search">
      <input id="u" type="text" autocomplete="off" placeholder="Pseudo du joueur…">
      <button id="go">Chercher</button>
    </div>
    <div class="plat">
      <button data-p="chesscom" class="on">Chess.com</button>
      <button data-p="lichess">Lichess</button>
    </div>
    <div id="out"><p class="msg">Entre un pseudo pour voir le profil, les Elo et les dernières parties.</p></div>
  </div>

  <script>
  const $=id=>document.getElementById(id);
  const P=new URLSearchParams(location.search);
  let platform=(P.get("p")==="lichess")?"lichess":"chesscom";

  function flag(cc){ if(!cc||cc.length!==2) return ""; return String.fromCodePoint(...[...cc.toUpperCase()].map(c=>127397+c.charCodeAt(0))); }
  function dt(ms){ return new Date(ms).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"}); }
  const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

  function setPlat(p){ platform=p; document.querySelectorAll(".plat button").forEach(b=>b.classList.toggle("on",b.dataset.p===p));
    const u=$("u").value.trim(); if(u) run(u); }
  document.querySelectorAll(".plat button").forEach(b=>b.onclick=()=>setPlat(b.dataset.p));
  document.querySelectorAll(".plat button").forEach(b=>b.classList.toggle("on",b.dataset.p===platform));

  $("go").onclick=()=>{ const u=$("u").value.trim(); if(u) run(u); };
  $("u").addEventListener("keydown",e=>{ if(e.key==="Enter"){ const u=$("u").value.trim(); if(u) run(u); } });

  function loading(){ $("out").innerHTML='<p class="msg">Chargement…</p>'; }
  function fail(m){ $("out").innerHTML=`<p class="msg err">${m}</p>`; }

  async function run(user){
    loading();
    const u=new URL(location); u.searchParams.set("u",user); u.searchParams.set("p",platform); history.replaceState(null,"",u);
    try{ const data = platform==="chesscom" ? await fetchCC(user) : await fetchLi(user); renderProfile(data); }
    catch(e){ fail("Joueur introuvable sur "+(platform==="chesscom"?"Chess.com":"Lichess")+", ou API indisponible."); }
  }

  /* ---------- Chess.com ---------- */
  async function fetchCC(user){
    const u=user.toLowerCase();
    const [pr,st]=await Promise.all([
      fetch("https://api.chess.com/pub/player/"+u).then(r=>{if(!r.ok)throw 0;return r.json();}),
      fetch("https://api.chess.com/pub/player/"+u+"/stats").then(r=>r.ok?r.json():{})
    ]);
    let games=[];
    try{
      const arch=await fetch("https://api.chess.com/pub/player/"+u+"/games/archives").then(r=>r.json());
      const lastUrl=arch.archives?.[arch.archives.length-1];
      if(lastUrl){ const m=await fetch(lastUrl).then(r=>r.json());
        games=(m.games||[]).slice(-8).reverse().map(g=>{
          const meWhite=g.white.username.toLowerCase()===u;
          const me=meWhite?g.white:g.black, opp=meWhite?g.black:g.white;
          const res = me.result==="win"?"win":(["checkmated","resigned","timeout","abandoned","lose"].includes(me.result)?"loss":"draw");
          return {white:g.white.username,whiteR:g.white.rating,black:g.black.username,blackR:g.black.rating,
            res, speed:g.time_class, date:dt((g.end_time||0)*1000), pgn:g.pgn, ext:g.url};
        });
      }
    }catch(_){}
    const cc = pr.country ? pr.country.split("/").pop() : "";
    const ratings=[];
    for(const [k,lbl] of [["chess_bullet","Bullet"],["chess_blitz","Blitz"],["chess_rapid","Rapide"],["chess_daily","Par jour"]]){
      const s=st[k]; if(s?.last?.rating){ const rec=s.record||{}; ratings.push({label:lbl,rating:s.last.rating,best:s.best?.rating,rec}); }
    }
    return {name:pr.name||pr.username,handle:pr.username,title:pr.title,url:pr.url,avatar:pr.avatar,
      created:pr.joined?dt(pr.joined*1000):"",country:cc,ratings,games};
  }

  /* ---------- Lichess ---------- */
  async function fetchLi(user){
    const pr=await fetch("https://lichess.org/api/user/"+user).then(r=>{if(!r.ok)throw 0;return r.json();});
    if(pr.closed||pr.disabled) throw 0;
    let games=[];
    try{
      const txt=await fetch("https://lichess.org/api/games/user/"+user+"?max=8&sort=dateDesc&pgnInJson=true",
        {headers:{Accept:"application/x-ndjson"}}).then(r=>r.text());
      games=txt.trim().split("\n").filter(Boolean).map(JSON.parse).map(g=>{
        const meWhite=(g.players.white.user?.id||g.players.white.user?.name||"").toLowerCase()===user.toLowerCase();
        const res = !g.winner ? "draw" : ((g.winner==="white")===meWhite ? "win":"loss");
        const wn=g.players.white.user?.name||"Anon", bn=g.players.black.user?.name||"Anon";
        return {white:wn,whiteR:g.players.white.rating,black:bn,blackR:g.players.black.rating,
          res, speed:g.speed, date:dt(g.createdAt), pgn:g.pgn, id:g.id, ext:"https://lichess.org/"+g.id};
      });
    }catch(_){}
    const perfMap=[["bullet","Bullet"],["blitz","Blitz"],["rapid","Rapide"],["classical","Classique"]];
    const ratings=perfMap.filter(([k])=>pr.perfs?.[k]?.games).map(([k,lbl])=>({label:lbl,rating:pr.perfs[k].rating,games:pr.perfs[k].games}));
    const c=pr.count||{};
    return {name:pr.username,handle:pr.username,title:pr.title,url:pr.url||("https://lichess.org/@/"+pr.username),
      avatar:null,created:pr.createdAt?dt(pr.createdAt):"",country:pr.profile?.country||"",
      totals:{win:c.win,loss:c.loss,draw:c.draw},ratings,games};
  }

  /* ---------- rendu ---------- */
  function renderProfile(d){
    let h='<div class="head">';
    if(d.avatar) h+=`<img class="avatar" src="${d.avatar}" alt="">`;
    else h+=`<div class="avatar" style="display:flex;align-items:center;justify-content:center;font-family:Instrument Serif,serif;font-size:1.8rem;color:var(--brass)">${esc((d.name||"?")[0])}</div>`;
    h+=`<div><div class="head__name">${d.title?`<span class="title-badge">${d.title}</span>`:""}${esc(d.name)}</div>
      <div class="head__meta"><span>@${esc(d.handle)}</span>${d.country?`<span>${flag(d.country)} ${d.country}</span>`:""}${d.created?`<span>Inscrit ${d.created}</span>`:""}
      <a href="${d.url}" target="_blank" rel="noopener" style="color:var(--brass);text-decoration:none">Profil ↗</a></div></div></div>`;

    if(d.ratings.length){
      h+='<div class="grid">';
      d.ratings.forEach(r=>{ let sub="";
        if(r.rec) sub=`<span class="w">${r.rec.win||0}V</span> · ${r.rec.draw||0}N · <span class="l">${r.rec.loss||0}D</span>`;
        else if(r.games!=null) sub=`${r.games.toLocaleString("fr-FR")} parties`;
        h+=`<div class="rc"><div class="rc__k">${r.label}</div><div class="rc__v">${r.rating}</div><div class="rc__sub">${sub}${r.best?` · record ${r.best}`:""}</div></div>`; });
      h+='</div>';
    }
    if(d.totals && (d.totals.win||d.totals.loss||d.totals.draw)){
      h+=`<div class="rc" style="margin-bottom:26px"><div class="rc__k">Bilan total</div><div class="rc__sub" style="font-size:.95rem;margin-top:6px"><span class="w">${d.totals.win} victoires</span> · ${d.totals.draw} nulles · <span class="l">${d.totals.loss} défaites</span></div></div>`;
    }

    h+='<h2>Dernières parties</h2>';
    if(!d.games.length){ h+='<p class="msg">Aucune partie récente récupérable.</p>'; }
    else { h+='<div class="games">';
      d.games.forEach((g,i)=>{
        const rl={win:"G",loss:"P",draw:"="}[g.res];
        const href = g.pgn ? "partie.html?pgn="+encodeURIComponent(g.pgn) : (g.id?"partie.html?id="+g.id:g.ext);
        h+=`<a class="g" href="${href}">
          <span class="g__res ${g.res}">${rl}</span>
          <span class="g__body"><span class="g__players">${esc(g.white)} <b style="color:var(--muted)">${g.whiteR||""}</b> — ${esc(g.black)} <b style="color:var(--muted)">${g.blackR||""}</b></span>
          <span class="g__sub">${g.speed||""} · ${g.date}</span></span>
          <span class="g__arrow">→</span></a>`;
      });
      h+='</div>';
    }
    $("out").innerHTML=h;
  }

  /* démarrage */
  const pu=P.get("u"); if(pu){ $("u").value=pu; run(pu); }
  </script>
</body>
</html>
