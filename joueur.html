<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Joueur — Caïssa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--void:#0a0b0e;--panel:#121419;--line:rgba(255,255,255,.08);--ivory:#f0e9dc;
    --muted:#948b7a;--brass:#cba861;--ok:#7fae86;--bad:#c97d6b;--pop:cubic-bezier(.16,1,.3,1)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Space Grotesk",system-ui,sans-serif;background:var(--void);color:var(--ivory);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100dvh}
  a{color:inherit}
  .topbar{display:flex;align-items:center;gap:14px;padding:18px 22px;border-bottom:1px solid var(--line)}
  .back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--muted);font-size:.9rem;padding:7px 12px;border:1px solid var(--line);border-radius:999px;transition:.2s}
  .back:hover{color:var(--ivory);border-color:var(--brass)}
  .topbar__brand{font-family:"Instrument Serif",serif;font-size:1.3rem;margin-left:auto}.topbar__brand em{font-style:italic;color:var(--brass)}
  .wrap{max-width:860px;margin:0 auto;padding:28px 22px 70px}

  .search{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .search input{flex:1;padding:11px 14px;border:1px solid var(--line);border-radius:999px;background:#0e1014;color:var(--ivory);font-family:inherit;font-size:1rem;outline:none}
  .search input:focus{border-color:var(--brass)}
  .search button{padding:11px 16px;border:0;border-radius:999px;background:var(--brass);color:var(--void);font-family:inherit;font-weight:600;cursor:pointer}
  .plat{display:flex;gap:6px;margin-bottom:26px}
  .plat button{font-family:inherit;font-size:.82rem;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:999px;padding:6px 14px;cursor:pointer;transition:.2s}
  .plat button.on{color:var(--void);background:var(--brass);border-color:var(--brass)}

  .head{display:flex;gap:18px;align-items:center;margin-bottom:24px}
  .avatar{width:66px;height:66px;border-radius:14px;flex:none;background:var(--panel);border:1px solid var(--line);object-fit:cover}
  .head__name{font-family:"Instrument Serif",serif;font-size:1.9rem;line-height:1.1}
  .head__meta{color:var(--muted);font-size:.88rem;margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
  .title-badge{font-size:.7rem;letter-spacing:.06em;color:var(--void);background:var(--brass);padding:2px 7px;border-radius:5px;font-weight:600;margin-right:8px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:26px}
  .rc{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px}
  .rc__k{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .rc__v{font-size:1.7rem;font-weight:600;margin-top:4px}
  .rc__sub{font-size:.76rem;color:var(--muted);margin-top:3px}.rc__sub .w{color:var(--ok)}.rc__sub .l{color:var(--bad)}

  h2{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--brass);font-weight:600;margin:0 0 12px}
  .filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
  .seg{display:flex;gap:2px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{font-family:inherit;font-size:.8rem;color:var(--muted);background:transparent;border:0;border-radius:7px;padding:6px 11px;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--brass);color:var(--void)}
  .chk{display:inline-flex;align-items:center;gap:7px;font-size:.82rem;color:var(--muted);cursor:pointer;user-select:none;border:1px solid var(--line);border-radius:10px;padding:7px 12px}
  .chk input{accent-color:var(--brass)}
  .oppf{flex:1;min-width:130px;padding:8px 12px;border:1px solid var(--line);border-radius:10px;background:#0e1014;color:var(--ivory);font-family:inherit;font-size:.85rem;outline:none}
  .oppf:focus{border-color:var(--brass)}

  .games{display:flex;flex-direction:column;gap:6px}
  .g{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--panel);text-decoration:none;transition:.15s}
  .g:hover{border-color:var(--brass);background:rgba(203,168,97,.06)}
  .g__res{flex:none;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem}
  .g__res.win{background:rgba(127,174,134,.18);color:var(--ok)}.g__res.loss{background:rgba(201,125,107,.18);color:var(--bad)}.g__res.draw{background:rgba(148,139,122,.18);color:var(--muted)}
  .g__body{min-width:0;flex:1}
  .g__players{font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .g__sub{font-size:.76rem;color:var(--muted)}
  .g__arrow{color:var(--muted);flex:none}
  .more{margin-top:14px;text-align:center}
  .more button{font-family:inherit;font-size:.9rem;color:var(--ivory);background:transparent;border:1px solid var(--line);border-radius:999px;padding:10px 22px;cursor:pointer;transition:.2s}
  .more button:hover{border-color:var(--brass);background:rgba(203,168,97,.06)}
  .more button:disabled{opacity:.5;cursor:default}
  .msg{color:var(--muted);padding:26px 0;text-align:center}.msg.err{color:var(--bad)}
  @media(max-width:560px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
  <header class="topbar">
    <a class="back" href="index.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Retour</a>
    <span class="topbar__brand">Ca<em>ï</em>ssa.</span>
  </header>

  <div class="wrap">
    <div class="search">
      <input id="u" type="text" autocomplete="off" placeholder="Pseudo du joueur…">
      <button id="go">Chercher</button>
    </div>
    <div class="plat">
      <button data-p="chesscom" class="on">Chess.com</button>
      <button data-p="lichess">Lichess</button>
    </div>
    <div id="out"><p class="msg">Entre un pseudo pour voir le profil, les Elo et parcourir ses parties.</p></div>
  </div>

  <script>
  const $=id=>document.getElementById(id);
  const PAR=new URLSearchParams(location.search);
  let platform=(PAR.get("p")==="lichess")?"lichess":"chesscom";
  let user="", allGames=[], filters={speed:"all",rated:false,opp:""};
  const cc={archives:[],idx:-1,done:true}, li={until:null,done:true};

  function flag(cc){ if(!cc||cc.length!==2) return ""; return String.fromCodePoint(...[...cc.toUpperCase()].map(c=>127397+c.charCodeAt(0))); }
  function dt(ms){ return new Date(ms).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"}); }
  const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  function speedBucket(s){ s=(s||"").toLowerCase();
    if(s.includes("bullet"))return"bullet"; if(s==="blitz")return"blitz"; if(s==="rapid"||s==="rapide")return"rapid";
    return "long"; } // classical, daily, correspondence

  function setPlat(p){ platform=p; document.querySelectorAll(".plat button").forEach(b=>b.classList.toggle("on",b.dataset.p===p));
    if($("u").value.trim()) run($("u").value.trim()); }
  document.querySelectorAll(".plat button").forEach(b=>b.onclick=()=>setPlat(b.dataset.p));
  document.querySelectorAll(".plat button").forEach(b=>b.classList.toggle("on",b.dataset.p===platform));
  $("go").onclick=()=>{ if($("u").value.trim()) run($("u").value.trim()); };
  $("u").addEventListener("keydown",e=>{ if(e.key==="Enter"&&$("u").value.trim()) run($("u").value.trim()); });

  async function run(uu){
    user=uu; allGames=[]; filters={speed:"all",rated:false,opp:""};
    $("out").innerHTML='<p class="msg">Chargement…</p>';
    const url=new URL(location); url.searchParams.set("u",uu); url.searchParams.set("p",platform); history.replaceState(null,"",url);
    try{
      const prof = platform==="chesscom" ? await profileCC(uu) : await profileLi(uu);
      renderShell(prof);
      await loadMore();
    }catch(e){ $("out").innerHTML='<p class="msg err">Joueur introuvable sur '+(platform==="chesscom"?"Chess.com":"Lichess")+', ou API indisponible.</p>'; }
  }

  /* ---------- Chess.com ---------- */
  async function profileCC(u){
    u=u.toLowerCase();
    const [pr,st]=await Promise.all([
      fetch("https://api.chess.com/pub/player/"+u).then(r=>{if(!r.ok)throw 0;return r.json();}),
      fetch("https://api.chess.com/pub/player/"+u+"/stats").then(r=>r.ok?r.json():{})
    ]);
    const arch=await fetch("https://api.chess.com/pub/player/"+u+"/games/archives").then(r=>r.ok?r.json():{archives:[]});
    cc.archives=arch.archives||[]; cc.idx=cc.archives.length-1; cc.done=cc.idx<0;
    const ratings=[];
    for(const [k,lbl] of [["chess_bullet","Bullet"],["chess_blitz","Blitz"],["chess_rapid","Rapide"],["chess_daily","Par jour"]]){
      const s=st[k]; if(s?.last?.rating){ ratings.push({label:lbl,rating:s.last.rating,best:s.best?.rating,rec:s.record||{}}); } }
    return {name:pr.name||pr.username,handle:pr.username,title:pr.title,url:pr.url,avatar:pr.avatar,
      created:pr.joined?dt(pr.joined*1000):"",country:pr.country?pr.country.split("/").pop():"",ratings};
  }
  async function pageCC(){
    if(cc.idx<0){ cc.done=true; return []; }
    const url=cc.archives[cc.idx]; cc.idx--; cc.done=cc.idx<0;
    const m=await fetch(url).then(r=>r.ok?r.json():{games:[]});
    return (m.games||[]).slice(-60).reverse().map(g=>{
      const meWhite=g.white.username.toLowerCase()===user.toLowerCase();
      const me=meWhite?g.white:g.black, opp=meWhite?g.black:g.white;
      const res=me.result==="win"?"win":(["checkmated","resigned","timeout","abandoned","lose","kingofthehill","threecheck","bughousepartnerlose"].includes(me.result)?"loss":"draw");
      return {white:g.white.username,whiteR:g.white.rating,black:g.black.username,blackR:g.black.rating,opp:opp.username,
        res,speed:speedBucket(g.time_class),rated:g.rated!==false,date:dt((g.end_time||0)*1000),ts:g.end_time||0,pgn:g.pgn,ext:g.url};
    });
  }

  /* ---------- Lichess ---------- */
  async function profileLi(u){
    const pr=await fetch("https://lichess.org/api/user/"+u).then(r=>{if(!r.ok)throw 0;return r.json();});
    if(pr.closed||pr.disabled) throw 0;
    li.until=null; li.done=false;
    const pm=[["bullet","Bullet"],["blitz","Blitz"],["rapid","Rapide"],["classical","Classique"]];
    const ratings=pm.filter(([k])=>pr.perfs?.[k]?.games).map(([k,lbl])=>({label:lbl,rating:pr.perfs[k].rating,games:pr.perfs[k].games}));
    const c=pr.count||{};
    return {name:pr.username,handle:pr.username,title:pr.title,url:pr.url||("https://lichess.org/@/"+pr.username),
      avatar:null,created:pr.createdAt?dt(pr.createdAt):"",country:pr.profile?.country||"",
      totals:{win:c.win,loss:c.loss,draw:c.draw},ratings};
  }
  async function pageLi(){
    if(li.done) return [];
    let url="https://lichess.org/api/games/user/"+user+"?max=20&sort=dateDesc&pgnInJson=true";
    if(li.until) url+="&until="+li.until;
    const txt=await fetch(url,{headers:{Accept:"application/x-ndjson"}}).then(r=>{if(!r.ok)throw 0;return r.text();});
    const arr=txt.trim().split("\n").filter(Boolean).map(JSON.parse);
    if(arr.length<20) li.done=true;
    if(arr.length) li.until=arr[arr.length-1].createdAt-1;
    return arr.map(g=>{
      const meWhite=(g.players.white.user?.id||g.players.white.user?.name||"").toLowerCase()===user.toLowerCase();
      const res=!g.winner?"draw":((g.winner==="white")===meWhite?"win":"loss");
      const wn=g.players.white.user?.name||"Anon", bn=g.players.black.user?.name||"Anon";
      return {white:wn,whiteR:g.players.white.rating,black:bn,blackR:g.players.black.rating,opp:meWhite?bn:wn,
        res,speed:speedBucket(g.speed),rated:!!g.rated,date:dt(g.createdAt),ts:g.createdAt,pgn:g.pgn,id:g.id,ext:"https://lichess.org/"+g.id};
    });
  }

  async function loadMore(){
    const btn=$("moreBtn"); if(btn){ btn.disabled=true; btn.textContent="Chargement…"; }
    try{ const batch = platform==="chesscom" ? await pageCC() : await pageLi(); allGames=allGames.concat(batch); }
    catch(e){}
    renderGames();
  }

  /* ---------- rendu ---------- */
  function renderShell(d){
    let h='<div class="head">';
    h+= d.avatar ? `<img class="avatar" src="${d.avatar}" alt="">`
      : `<div class="avatar" style="display:flex;align-items:center;justify-content:center;font-family:Instrument Serif,serif;font-size:1.8rem;color:var(--brass)">${esc((d.name||"?")[0])}</div>`;
    h+=`<div><div class="head__name">${d.title?`<span class="title-badge">${d.title}</span>`:""}${esc(d.name)}</div>
      <div class="head__meta"><span>@${esc(d.handle)}</span>${d.country?`<span>${flag(d.country)} ${d.country}</span>`:""}${d.created?`<span>Inscrit ${d.created}</span>`:""}
      <a href="${d.url}" target="_blank" rel="noopener" style="color:var(--brass);text-decoration:none">Profil ↗</a></div></div></div>`;
    if(d.ratings.length){ h+='<div class="grid">';
      d.ratings.forEach(r=>{ let sub=r.rec?`<span class="w">${r.rec.win||0}V</span> · ${r.rec.draw||0}N · <span class="l">${r.rec.loss||0}D</span>`:(r.games!=null?`${r.games.toLocaleString("fr-FR")} parties`:"");
        h+=`<div class="rc"><div class="rc__k">${r.label}</div><div class="rc__v">${r.rating}</div><div class="rc__sub">${sub}${r.best?` · record ${r.best}`:""}</div></div>`; });
      h+='</div>'; }
    if(d.totals&&(d.totals.win||d.totals.loss||d.totals.draw))
      h+=`<div class="rc" style="margin-bottom:26px"><div class="rc__k">Bilan total</div><div class="rc__sub" style="font-size:.95rem;margin-top:6px"><span class="w">${d.totals.win} victoires</span> · ${d.totals.draw} nulles · <span class="l">${d.totals.loss} défaites</span></div></div>`;

    h+='<h2>Parties</h2>';
    h+=`<div class="filters">
      <div class="seg" id="segSpeed">
        <button data-s="all" class="on">Toutes</button><button data-s="bullet">Bullet</button>
        <button data-s="blitz">Blitz</button><button data-s="rapid">Rapide</button><button data-s="long">Longue</button>
      </div>
      <label class="chk"><input type="checkbox" id="ratedChk"> Classées</label>
      <input class="oppf" id="oppF" type="text" placeholder="Filtrer par adversaire…">
    </div>`;
    h+='<div class="games" id="games"></div>';
    h+='<div class="more" id="moreWrap"><button id="moreBtn">Charger plus de parties</button></div>';
    $("out").innerHTML=h;

    $("segSpeed").addEventListener("click",e=>{ const b=e.target.closest("button"); if(!b)return;
      $("segSpeed").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b)); filters.speed=b.dataset.s; renderGames(); });
    $("ratedChk").addEventListener("change",e=>{ filters.rated=e.target.checked; renderGames(); });
    $("oppF").addEventListener("input",e=>{ filters.opp=e.target.value.trim().toLowerCase(); renderGames(); });
    $("moreBtn").addEventListener("click",loadMore);
  }

  function renderGames(){
    const box=$("games"); if(!box) return;
    let g=allGames.slice();
    if(filters.speed!=="all") g=g.filter(x=>x.speed===filters.speed);
    if(filters.rated) g=g.filter(x=>x.rated);
    if(filters.opp) g=g.filter(x=>(x.opp||"").toLowerCase().includes(filters.opp));
    if(!g.length){ box.innerHTML='<p class="msg">Aucune partie ne correspond à ces filtres.</p>'; }
    else box.innerHTML=g.map(x=>{
      const rl={win:"G",loss:"P",draw:"="}[x.res];
      const href=x.pgn?"partie.html?pgn="+encodeURIComponent(x.pgn):(x.id?"partie.html?id="+x.id:x.ext);
      const sp={bullet:"Bullet",blitz:"Blitz",rapid:"Rapide",long:"Longue"}[x.speed]||x.speed;
      return `<a class="g" href="${href}"><span class="g__res ${x.res}">${rl}</span>
        <span class="g__body"><span class="g__players">${esc(x.white)} <b style="color:var(--muted)">${x.whiteR||""}</b> — ${esc(x.black)} <b style="color:var(--muted)">${x.blackR||""}</b></span>
        <span class="g__sub">${sp}${x.rated?"":" · amicale"} · ${x.date}</span></span><span class="g__arrow">→</span></a>`;
    }).join("");
    const done = platform==="chesscom" ? cc.done : li.done;
    const btn=$("moreBtn");
    if(btn){ btn.disabled=false; btn.textContent="Charger plus de parties"; $("moreWrap").style.display = done ? "none" : ""; }
  }

  const pu=PAR.get("u"); if(pu){ $("u").value=pu; run(pu); }
  </script>
</body>
</html>
