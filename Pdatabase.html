<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Parties — Caïssa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--void:#0a0b0e;--panel:#121419;--line:rgba(255,255,255,.08);--ivory:#f0e9dc;
    --muted:#948b7a;--brass:#cba861;--pop:cubic-bezier(.16,1,.3,1)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Space Grotesk",system-ui,sans-serif;background:var(--void);color:var(--ivory);
    line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100dvh}
  a{color:inherit}
  .topbar{display:flex;align-items:center;gap:14px;padding:18px 22px;border-bottom:1px solid var(--line)}
  .back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--muted);font-size:.9rem;
    padding:7px 12px;border:1px solid var(--line);border-radius:999px;transition:.2s}
  .back:hover{color:var(--ivory);border-color:var(--brass)}
  .topbar__brand{font-family:"Instrument Serif",serif;font-size:1.3rem;margin-left:auto}
  .topbar__brand em{font-style:italic;color:var(--brass)}
  .wrap{max-width:880px;margin:0 auto;padding:26px 22px 80px}

  .head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .eco{font-size:.68rem;letter-spacing:.06em;color:var(--void);background:var(--brass);
    padding:3px 8px;border-radius:5px;font-weight:600}
  h1{font-family:"Instrument Serif",serif;font-weight:400;font-size:clamp(1.7rem,4vw,2.4rem);line-height:1.1}
  .sub{color:var(--muted);font-size:.9rem;margin:4px 0 20px}

  .bar{display:flex;height:7px;border-radius:99px;overflow:hidden;background:#1c1e24;margin-bottom:7px}
  .bar i{display:block;height:100%;transition:width .4s var(--pop)}
  .bar .w{background:#e8e2d3}.bar .d{background:#6b6b73}.bar .b{background:#33343c}
  .barleg{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:20px}

  /* ---------- filtres ---------- */
  .filters{border:1px solid var(--line);border-radius:14px;background:var(--panel);
    padding:14px 16px;margin-bottom:16px;display:flex;flex-direction:column;gap:13px}
  .frow{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .flab{font-size:.66rem;letter-spacing:.15em;text-transform:uppercase;color:var(--brass);
    font-weight:600;width:78px;flex:none}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{font-family:inherit;font-size:.82rem;color:var(--muted);background:transparent;
    border:0;border-right:1px solid var(--line);padding:7px 13px;cursor:pointer;transition:.16s}
  .seg button:last-child{border-right:0}
  .seg button:hover{color:var(--ivory);background:rgba(255,255,255,.04)}
  .seg button.on{background:var(--brass);color:var(--void);font-weight:600}
  .num{width:80px;background:#0e1014;border:1px solid var(--line);border-radius:8px;color:var(--ivory);
    font-family:inherit;font-size:.88rem;padding:7px 9px;outline:none}
  .num:focus{border-color:var(--brass)}
  .dash{color:var(--muted)}
  .band{font-family:inherit;font-size:.76rem;color:var(--muted);background:transparent;
    border:1px solid var(--line);border-radius:999px;padding:5px 11px;cursor:pointer;transition:.16s}
  .band:hover{color:var(--ivory);border-color:var(--brass)}
  .fcount{margin-left:auto;font-size:.85rem;color:var(--muted)}
  .fcount b{color:var(--ivory)}

  /* ---------- liste ---------- */
  .list{display:flex;flex-direction:column;gap:5px}
  .row{border:1px solid var(--line);border-radius:11px;background:var(--panel);overflow:hidden;transition:.16s}
  .row.open{border-color:var(--brass)}
  .row__hd{display:flex;align-items:center;gap:12px;padding:10px 12px;cursor:pointer;
    font-family:inherit;width:100%;background:transparent;border:0;color:inherit;text-align:left}
  .row__hd:hover{background:rgba(203,168,97,.05)}
  .row__r{flex:none;width:40px;text-align:center;font-size:.72rem;font-weight:600;padding:3px 0;border-radius:5px}
  .row__r.w{background:#e8e2d3;color:#2a2419}.row__r.d{background:#6b6b73;color:#fff}
  .row__r.b{background:#26262b;color:#e8e2d3}
  .row__e{flex:none;font-size:.84rem;font-variant-numeric:tabular-nums;color:var(--ivory);width:96px}
  .row__e span{color:var(--muted)}
  .row__m{flex:1;min-width:0;font-size:.8rem;color:var(--muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row__c{flex:none;color:var(--muted);transition:transform .22s var(--pop);font-size:.8rem}
  .row.open .row__c{transform:rotate(90deg);color:var(--brass)}

  .row__bd{display:none;padding:2px 14px 14px;border-top:1px solid var(--line)}
  .row.open .row__bd{display:block}
  .players{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;
    margin:13px 0;text-align:center}
  .pl__side{font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .pl__nm{font-size:.95rem;color:var(--ivory);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pl__el{font-family:"Instrument Serif",serif;font-size:1.5rem;color:var(--brass);line-height:1.1}
  .pl__vs{color:var(--muted);font-size:.8rem}
  .facts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .fact{font-size:.76rem;color:var(--muted);border:1px solid var(--line);border-radius:7px;padding:4px 9px}
  .fact b{color:var(--ivory);font-weight:500}
  .pgn{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.74rem;color:var(--muted);
    background:#0e1014;border:1px solid var(--line);border-radius:8px;padding:9px 11px;
    max-height:88px;overflow:auto;margin-bottom:12px;line-height:1.6}
  .acts{display:flex;gap:8px;flex-wrap:wrap}
  .act{font-family:inherit;font-size:.8rem;text-decoration:none;color:var(--void);background:var(--brass);
    border-radius:8px;padding:7px 14px;font-weight:600;transition:.18s}
  .act:hover{filter:brightness(1.1)}
  .act.gh{background:transparent;color:var(--ivory);border:1px solid var(--line)}
  .act.gh:hover{border-color:var(--brass);filter:none}

  .more{margin:20px auto 0;display:block;font-family:inherit;font-size:.86rem;color:var(--ivory);
    cursor:pointer;padding:12px 26px;border:1px solid var(--line);border-radius:11px;
    background:transparent;transition:.2s}
  .more:hover{border-color:var(--brass);background:rgba(203,168,97,.06)}
  .end{text-align:center;color:var(--muted);font-size:.82rem;margin-top:20px}
  .msg{color:var(--muted);padding:40px 0;text-align:center}.msg.err{color:#c97d6b}
  @media(max-width:600px){
    .flab{width:100%}.fcount{margin-left:0;width:100%}
    .row__m{display:none}.row__e{width:auto}
    .players{grid-template-columns:1fr auto 1fr;gap:6px}
  }
</style>
</head>
<body>
  <header class="topbar">
    <a class="back" href="index.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Retour</a>
    <span class="topbar__brand">Ca<em>ï</em>ssa.</span>
  </header>

  <div class="wrap" id="wrap"><p class="msg">Chargement de l'ouverture…</p></div>

<script>
/* ------------------------------------------------------------------ *
 *  BASE — où sont les fichiers produits par caissa_export.py.
 *  En local : "web".  Une fois poussés sur Hugging Face :
 *  "https://huggingface.co/datasets/TON-PSEUDO/caissa-parties/resolve/main"
 * ------------------------------------------------------------------ */
const BASE = "https://huggingface.co/datasets/Cowboybeblop/caissa-db/resolve/main";
const PAS = 100;

const $  = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const slug = new URLSearchParams(location.search).get("o") || "";

let DATA = null, vue = [], affiches = 0, ouverte = null;
let fRes = "", fCad = "", fMin = null, fMax = null, fTri = "elo";

/* .json.gz lu sans aucune bibliothèque : DecompressionStream est natif. */
async function lireGz(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error("HTTP " + r.status);
  if(!("DecompressionStream" in window)) throw new Error("Navigateur trop ancien pour le gzip.");
  return JSON.parse(await new Response(r.body.pipeThrough(new DecompressionStream("gzip"))).text());
}

/* La cadence n'est pas un champ à part dans la base : on l'estime depuis la
   pendule du tout premier coup, déjà présente dans le texte des coups
   ("{ [%eval 0.2] [%clk 0:01:00] }"). Pas d'incrément connu depuis un seul
   coup, donc c'est une approximation basée sur le temps de base seulement —
   suffisant pour distinguer bullet/blitz/rapide/classique dans l'immense
   majorité des cas. Pas de pendule trouvée = partie sans annotation (souvent
   plus ancienne dans le dataset) → catégorie "?".
   Seuils identiques à Lichess (secondes) : <180 bullet, <480 blitz, <1500 rapide, sinon classique. */
function estimerCadence(coups){
  const m = coups && coups.match(/\[%clk (\d+):(\d{2}):(\d{2})\]/);
  if(!m) return "?";
  const secs = (+m[1]) * 3600 + (+m[2]) * 60 + (+m[3]);
  if(secs < 180) return "bullet";
  if(secs < 480) return "blitz";
  if(secs < 1500) return "rapide";
  return "classique";
}

async function boot(){
  if(!slug){ $("wrap").innerHTML = '<p class="msg err">Aucune ouverture indiquée.</p>'; return; }
  try{ DATA = await lireGz(`${BASE}/o/${encodeURIComponent(slug)}.json.gz`); }
  catch(e){
    $("wrap").innerHTML = `<p class="msg err">Impossible de charger cette ouverture.<br>
      <span style="font-size:.85rem">${esc(e.message)} — vérifie la constante BASE en haut de Pdatabase.html.</span></p>`;
    return;
  }
  DATA.g.forEach(g => { if(g.length < 6) g.push(estimerCadence(g[4])); });
  cadre(); appliquer();
}

function cadre(){
  $("wrap").innerHTML = `
    <div class="head"><span class="eco">${esc(DATA.eco||"?")}</span><h1>${esc(DATA.n)}</h1></div>
    <p class="sub">${DATA.c.toLocaleString("fr-FR")} parties dans la base.</p>
    <div class="bar" id="bar"></div>
    <div class="barleg" id="barleg"></div>

    <div class="filters">
      <div class="frow">
        <span class="flab">Issue</span>
        <div class="seg" id="segRes">
          <button data-v="" class="on">Toutes</button>
          <button data-v="1-0">Blancs</button>
          <button data-v="1/2-1/2">Nulles</button>
          <button data-v="0-1">Noirs</button>
        </div>
      </div>
      <div class="frow">
        <span class="flab">Cadence</span>
        <div class="seg" id="segCad">
          <button data-v="" class="on">Toutes</button>
          <button data-v="bullet">Bullet</button>
          <button data-v="blitz">Blitz</button>
          <button data-v="rapide">Rapide</button>
          <button data-v="classique">Classique</button>
          <button data-v="?">Sans horloge</button>
        </div>
      </div>
      <div class="frow">
        <span class="flab">Elo moyen</span>
        <input class="num" id="fmin" type="number" placeholder="min" min="0" max="4000">
        <span class="dash">—</span>
        <input class="num" id="fmax" type="number" placeholder="max" min="0" max="4000">
        <button class="band" data-lo="0"    data-hi="1600">&lt; 1600</button>
        <button class="band" data-lo="1600" data-hi="2000">1600–2000</button>
        <button class="band" data-lo="2000" data-hi="2400">2000–2400</button>
        <button class="band" data-lo="2400" data-hi="4000">2400+</button>
        <button class="band" data-lo="" data-hi="">Tout</button>
      </div>
      <div class="frow">
        <span class="flab">Tri</span>
        <div class="seg" id="segTri">
          <button data-v="elo" class="on">Elo ↓</button>
          <button data-v="elo-">Elo ↑</button>
          <button data-v="ordre">Base</button>
        </div>
        <span class="fcount" id="fcount"></span>
      </div>
    </div>

    <div class="list" id="list"></div>
    <button class="more" id="more" style="display:none"></button>
    <p class="end" id="end" style="display:none"></p>`;

  $("segRes").addEventListener("click", e => {
    const b = e.target.closest("button"); if(!b) return;
    fRes = b.dataset.v;
    [...$("segRes").children].forEach(x => x.classList.toggle("on", x === b));
    appliquer();
  });
  $("segCad").addEventListener("click", e => {
    const b = e.target.closest("button"); if(!b) return;
    fCad = b.dataset.v;
    [...$("segCad").children].forEach(x => x.classList.toggle("on", x === b));
    appliquer();
  });
  $("segTri").addEventListener("click", e => {
    const b = e.target.closest("button"); if(!b) return;
    fTri = b.dataset.v;
    [...$("segTri").children].forEach(x => x.classList.toggle("on", x === b));
    appliquer();
  });
  document.querySelectorAll(".band").forEach(b => b.onclick = () => {
    $("fmin").value = b.dataset.lo; $("fmax").value = b.dataset.hi; lireElo(); appliquer();
  });
  ["fmin","fmax"].forEach(id => $(id).addEventListener("input", debounce(() => { lireElo(); appliquer(); }, 250)));
  $("more").onclick = lot;
}

function lireElo(){
  const a = parseInt($("fmin").value, 10), b = parseInt($("fmax").value, 10);
  fMin = isNaN(a) ? null : a; fMax = isNaN(b) ? null : b;
}
function debounce(f, ms){ let t; return (...a) => { clearTimeout(t); t = setTimeout(() => f(...a), ms); }; }

function appliquer(){
  ouverte = null;
  vue = DATA.g.filter(g => {
    const moy = (g[2] + g[3]) / 2;
    if(fMin !== null && moy < fMin) return false;
    if(fMax !== null && moy > fMax) return false;
    if(fRes && g[1] !== fRes) return false;
    if(fCad && g[5] !== fCad) return false;
    return true;
  });
  if(fTri === "elo")  vue.sort((a,b) => (b[2]+b[3]) - (a[2]+a[3]));
  if(fTri === "elo-") vue.sort((a,b) => (a[2]+a[3]) - (b[2]+b[3]));

  const n = vue.length;
  const w = vue.filter(g => g[1] === "1-0").length;
  const d = vue.filter(g => g[1] === "1/2-1/2").length;
  const b = n - w - d, pc = x => n ? Math.round(100*x/n) : 0;
  $("bar").innerHTML = n
    ? `<i class="w" style="width:${100*w/n}%"></i><i class="d" style="width:${100*d/n}%"></i><i class="b" style="width:${100*b/n}%"></i>`
    : "";
  $("barleg").innerHTML = n
    ? `<span>Blancs ${pc(w)} %</span><span>Nulles ${pc(d)} %</span><span>Noirs ${pc(b)} %</span>` : "";
  $("fcount").innerHTML = `<b>${n.toLocaleString("fr-FR")}</b> partie${n>1?"s":""}`;

  $("list").innerHTML = ""; affiches = 0;
  if(!n){
    $("list").innerHTML = '<p class="msg">Aucune partie avec ces filtres.</p>';
    $("more").style.display = "none"; $("end").style.display = "none"; return;
  }
  lot();
}

function lot(){
  const frag = document.createDocumentFragment();
  const fin = Math.min(affiches + PAS, vue.length);
  for(let i = affiches; i < fin; i++) frag.appendChild(ligne(vue[i], i));
  $("list").appendChild(frag);
  affiches = fin;

  const reste = vue.length - affiches;
  $("more").style.display = reste > 0 ? "" : "none";
  $("more").textContent = `Charger ${Math.min(PAS, reste)} autres parties (${reste.toLocaleString("fr-FR")} restantes)`;
  $("end").style.display = reste > 0 ? "none" : "";
  $("end").textContent = `Fin de la liste — ${affiches.toLocaleString("fr-FR")} parties affichées.`;
}

const CAD_LBL = {bullet:"Bullet", blitz:"Blitz", rapide:"Rapide", classique:"Classique", "?":"Sans horloge"};

function ligne(g, i){
  const [id, res, we, be, coups, cad] = g;
  const cls = res === "1-0" ? "w" : res === "0-1" ? "b" : "d";
  const lbl = res === "1-0" ? "1–0" : res === "0-1" ? "0–1" : "½–½";

  const row = document.createElement("div");
  row.className = "row";
  row.innerHTML = `
    <button class="row__hd" aria-expanded="false">
      <span class="row__r ${cls}">${lbl}</span>
      <span class="row__e">${we} <span>/</span> ${be}</span>
      <span class="row__m">${esc(CAD_LBL[cad] || cad || "")} · ${esc(coups)}</span>
      <span class="row__c">▶</span>
    </button>
    <div class="row__bd"></div>`;

  row.querySelector(".row__hd").addEventListener("click", () => {
    const dejaOuverte = row.classList.contains("open");
    if(ouverte && ouverte !== row){ ouverte.classList.remove("open");
      ouverte.querySelector(".row__hd").setAttribute("aria-expanded","false"); }
    row.classList.toggle("open", !dejaOuverte);
    row.querySelector(".row__hd").setAttribute("aria-expanded", String(!dejaOuverte));
    ouverte = dejaOuverte ? null : row;
    if(!dejaOuverte && !row.dataset.rempli){ row.dataset.rempli = "1"; detail(row, g); }
  });
  return row;
}

function detail(row, g){
  const [id, res, we, be, coups, cad] = g;
  const ecart = Math.abs(we - be);
  const gagnant = res === "1-0" ? "les Blancs" : res === "0-1" ? "les Noirs" : null;
  const favori  = we === be ? null : (we > be ? "1-0" : "0-1");
  const surprise = gagnant && favori && favori !== res && ecart >= 100;

  row.querySelector(".row__bd").innerHTML = `
    <div class="players">
      <div>
        <div class="pl__side">Blancs</div>
        <div class="pl__nm" data-nom="w">…</div>
        <div class="pl__el">${we}</div>
      </div>
      <div class="pl__vs">vs</div>
      <div>
        <div class="pl__side">Noirs</div>
        <div class="pl__nm" data-nom="b">…</div>
        <div class="pl__el">${be}</div>
      </div>
    </div>
    <div class="facts">
      <span class="fact">Elo moyen <b>${Math.round((we+be)/2)}</b></span>
      <span class="fact">Écart <b>${ecart}</b></span>
      <span class="fact">Cadence <b>${esc(CAD_LBL[cad] || cad || "?")}</b></span>
      <span class="fact">Issue <b>${gagnant ? "victoire de " + gagnant : "partie nulle"}</b></span>
      ${surprise ? '<span class="fact">Le moins bien classé <b>l\'emporte</b></span>' : ""}
    </div>
    <div class="pgn">${esc(coups)}${coups && coups.split(" ").length >= 39 ? " …" : ""}</div>
    <div class="acts">
      <a class="act" href="partie.html?id=${encodeURIComponent(id)}">Analyser avec Stockfish</a>
      <a class="act gh" href="https://lichess.org/${encodeURIComponent(id)}" target="_blank" rel="noopener">Voir sur Lichess ↗</a>
    </div>`;
  infosLichess(row, id);
}

/* Les pseudos ne sont pas dans la base (seuls les Elo le sont) : on va les
   chercher chez Lichess à l'ouverture d'une ligne, et une seule fois. */
const CACHE = new Map();
async function infosLichess(row, id){
  const wn = row.querySelector('[data-nom="w"]'), bn = row.querySelector('[data-nom="b"]');
  const pose = d => {
    if(!d){ wn.textContent = bn.textContent = "joueur inconnu";
            wn.style.color = bn.style.color = "var(--muted)"; return; }
    wn.textContent = d.w; bn.textContent = d.b;
  };
  if(CACHE.has(id)) return pose(CACHE.get(id));
  try{
    const r = await fetch(`https://lichess.org/game/export/${id}?moves=false&tags=true&clocks=false&evals=false`,
                          {headers:{Accept:"application/x-chess-pgn"}});
    if(!r.ok) throw 0;
    const t = await r.text();
    const tag = k => (t.match(new RegExp(`\\[${k} "([^"]*)"\\]`)) || [,""])[1];
    const d = { w: tag("White") || "?", b: tag("Black") || "?" };
    CACHE.set(id, d); pose(d);
  }catch(e){ CACHE.set(id, null); pose(null); }
}

boot();
</script>
</body>
</html>
